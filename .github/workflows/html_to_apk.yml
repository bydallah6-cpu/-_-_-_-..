name: Convert HTML to APK

on:
  push:
    branches: [ "main", "master", "رئيسي" ]
  workflow_dispatch:

jobs:
  convert-to-apk:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up NodeJS
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Cordova and Build APK
      run: |
        # 1. تثبيت كوردوفا
        npm install -g cordova
        
        # 2. إنشاء مشروع أندرويد (تم حذف الشرطة لتفادي الخطأ)
        cordova create html_app com.bydallah.myapp "MyHTMLApp"
        
        # 3. تنظيف المجلد الافتراضي
        rm -rf html_app/www
        mkdir html_app/www
        
        # 4. نسخ ملفاتك الحالية إلى مجلد التطبيق
        rsync -av --exclude='html_app' --exclude='.github' --exclude='README.md' ./ html_app/www/
        
        # 5. بناء الـ APK
        cd html_app
        cordova platform add android
        cordova build android --debug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: my-html-app-apk
        path: html_app/platforms/android/app/build/outputs/apk/debug/app-debug.apk

